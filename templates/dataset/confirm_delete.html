{% extends 'base.html' %}
{% block title %}Delete Dataset{% endblock %}
{% block page_title %}Delete Dataset{% endblock %}
{% block content %}
<div style="max-width:500px;margin:40px auto;">
  <div class="card" style="border-color:var(--danger);">
    <div style="text-align:center;padding:20px 0;">
      <i class="fas fa-exclamation-triangle" style="font-size:50px;color:var(--danger);margin-bottom:16px;display:block;"></i>
      <h2 style="font-family:var(--font-head);color:#fff;margin-bottom:10px;">Delete Dataset?</h2>
      <p class="text-muted">Are you sure you want to delete <strong style="color:#fff">{{ dataset.name }}</strong>?<br>This action cannot be undone.</p>
    </div>
    <div style="display:flex;gap:12px;margin-top:20px;">
      <form method="post" style="flex:1">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger w-100"><i class="fas fa-trash"></i> Yes, Delete</button>
      </form>
      <a href="{% url 'list_datasets' %}" class="btn btn-outline" style="flex:1;justify-content:center;">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
